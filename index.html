<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><script src="https://telegram.org"></script><style>body{font-family:sans-serif;padding:20px;display:flex;flex-direction:column;gap:15px;background:#fff}input{padding:15px;border-radius:10px;border:2px solid #0088cc;font-size:18px;width:100%;box-sizing:border-box}label{font-weight:bold;font-size:12px;color:#555}</style></head><body>
<label>РУССКИЙ ➔ ПЕРСИДСКИЙ</label>
<input type="text" id="r" lang="ru" placeholder="Напиши и нажми Готово">
<label>ПЕРСИДСКИЙ ➔ РУССКИЙ</label>
<input type="text" id="f" lang="fa" style="direction:rtl" placeholder="Напиши и нажми Готово">
<script>
const tg=window.Telegram.WebApp;tg.expand();
async function tr(el,s,t){
  if(!el.value)return;
  try {
    const url = `https://translate.googleapis.com{s}&tl=${t}&dt=t&q=${encodeURI(el.value)}`;
    const r = await fetch(url);
    const j = await r.json();
    if(j && j[0] && j[0][0]) {
      el.value = j[0][0][0]; // Достаем чистый текст перевода
    }
  } catch(e) { console.error(e); }
}
document.getElementById('r').onchange=function(){tr(this,'ru','fa')};
document.getElementById('f').onchange=function(){tr(this,'fa','ru')};
</script></body></html>
