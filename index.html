<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><script src="https://telegram.org"></script><style>body{font-family:sans-serif;padding:20px;display:flex;flex-direction:column;gap:10px;background:#f0f2f5}textarea{padding:15px;border-radius:12px;border:1px solid #ddd;font-size:18px;width:100%;box-sizing:border-box;resize:none;height:120px;outline:none;display:block}label{font-weight:bold;font-size:12px;color:#888;margin-top:10px;text-transform:uppercase}</style></head><body>
<label>Русский текст</label>
<textarea id="ru" placeholder="Введите текст..."></textarea>
<label>Персидский перевод (Farsi)</label>
<textarea id="fa" style="direction:rtl" placeholder="ترجمه..."></textarea>
<script>
const tg=window.Telegram.WebApp;tg.expand();
let timer;
async function tr(val,sl,tl,target){
    if(!val.trim()){document.getElementById(target).value='';return;}
    try{
        const url=`https://translate.googleapis.com{sl}&tl=${tl}&dt=t&q=${encodeURIComponent(val)}`;
        const r=await fetch(url);
        const j=await r.json();
        let res='';
        if(j&&j[0]){
            j[0].forEach(item=>{if(item[0])res+=item[0]});
            document.getElementById(target).value=res;
        }
    }catch(e){console.error(e);}
}
function start(v,s,t,dest){
    clearTimeout(timer);
    timer=setTimeout(()=>tr(v,s,t,dest),800); // Ждем 0.8 сек после ввода
}
document.getElementById('ru').oninput=function(){start(this.value,'ru','fa','fa')};
document.getElementById('fa').oninput=function(){start(this.value,'fa','ru','ru')};
</script></body></html>
