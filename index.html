<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><script src="https://telegram.org"></script><style>body{font-family:sans-serif;padding:20px;display:flex;flex-direction:column;gap:10px;background:#f0f2f5}textarea{padding:15px;border-radius:12px;border:1px solid #ddd;font-size:18px;width:100%;box-sizing:border-box;resize:none;height:120px;outline:none;display:block}textarea:focus{border-color:#0088cc}label{font-weight:bold;font-size:12px;color:#888;margin-top:10px;text-transform:uppercase}</style></head><body>
<label>Русский текст</label>
<textarea id="ru" placeholder="Введите текст..."></textarea>
<label>Персидский перевод (Farsi)</label>
<textarea id="fa" style="direction:rtl" placeholder="ترجمه..."></textarea>
<script>
const tg=window.Telegram.WebApp;tg.expand();
let timer;
async function tr(text,sl,tl,targetId){
if(!text){document.getElementById(targetId).value='';return;}
try{const r=await fetch(`https://translate.googleapis.com{sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`);
const j=await r.json();if(j&&j[0]) {
let res='';j[0].forEach(s=>{if(s[0])res+=s[0]});
document.getElementById(targetId).value=res;
}}catch(e){console.error(e)}}
function debounce(fn,s,t,target){
clearTimeout(timer);
timer=setTimeout(()=>fn(document.getElementById(s).value,s,t,target),1000);}
document.getElementById('ru').oninput=()=>debounce(tr,'ru','fa','fa');
document.getElementById('fa').oninput=()=>debounce(tr,'fa','ru','ru');
</script></body></html>
