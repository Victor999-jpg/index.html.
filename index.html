<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><script src="https://telegram.org"></script><style>body{font-family:sans-serif;padding:20px;display:flex;flex-direction:column;gap:15px;background:#fff}input{padding:15px;border-radius:10px;border:2px solid #0088cc;font-size:18px;width:100%;box-sizing:border-box}label{font-weight:bold;font-size:12px;color:#555}</style></head><body>
<label>РУССКИЙ ➔ ПЕРСИДСКИЙ</label>
<input type="text" id="r" lang="ru" placeholder="Напиши и нажми Enter">
<label>ПЕРСИДСКИЙ ➔ РУССКИЙ</label>
<input type="text" id="f" lang="fa" style="direction:rtl" placeholder="...بنویس и нажми Enter">
<script>
const tg=window.Telegram.WebApp;tg.expand();
async function translateText(el, sl, tl) {
    const text = el.value;
    if (!text) return;
    try {
        const url = `https://translate.googleapis.com{sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
        const response = await fetch(url);
        const data = await response.json();
        if (data && data[0] && data[0][0] && data[0][0][0]) {
            el.value = data[0][0][0]; // Вот здесь мы достаем само слово
        }
    } catch (e) { console.error('Error:', e); }
}
document.getElementById('r').onchange = function() { translateText(this, 'ru', 'fa'); };
document.getElementById('f').onchange = function() { translateText(this, 'fa', 'ru'); };
</script></body></html>
