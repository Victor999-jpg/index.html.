<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><script src="https://telegram.org"></script><style>body{font-family:sans-serif;padding:20px;display:flex;flex-direction:column;gap:15px;background:#fff}input{padding:15px;border-radius:10px;border:2px solid #0088cc;font-size:20px;width:100%;box-sizing:border-box}label{font-weight:bold;font-size:12px;color:#555}</style></head><body><label>РУССКАЯ КЛАВА ➔ ПЕРСИДСКИЙ (МГНОВЕННО)</label><input type="text" id="r" lang="ru" placeholder="Пиши по-русски..."><label>ПЕРСИДСКАЯ КЛАВА ➔ РУССКИЙ (МГНОВЕННО)</label><input type="text" id="f" lang="fa" style="direction:rtl" placeholder="...بنویس"><script>const tg=window.Telegram.WebApp;tg.expand();const m={'й':'ض','ц':'ص','у':'ث','к':'ق','е':'ف','н':'غ','г':'ع','ш':'ه','щ':'خ','з':'ح','х':'ج','ъ':'چ','ф':'ش','ы':'س','в':'ی','а':'ب','п':'л','р':'ا','о':'т','л':'н','д':'м','ж':'ک','э':'گ','я':'ظ','ч':'ط','с':'ز','м':'ر','и':'ذ','т':'د','ь':'پ','б':'و','ю':'.'};const rm=Object.fromEntries(Object.entries(m).map(([k,v])=>[v,k]));function s(id,map){const e=document.getElementById(id);e.oninput=()=>{let v=e.value;let out='';for(let char of v){let l=char.toLowerCase();out+=map[l]||char;}e.value=out;};}s('r',m);s('f',rm);</script></body></html>
