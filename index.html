<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><script src="https://telegram.org"></script><style>body{font-family:sans-serif;padding:20px;display:flex;flex-direction:column;gap:10px;background:#eef}textarea{padding:15px;border-radius:12px;border:1px solid #ddd;font-size:18px;width:100%;box-sizing:border-box;resize:none;height:120px;outline:none;display:block}label{font-weight:bold;font-size:12px;color:#888;margin-top:10px;text-transform:uppercase}#st{font-size:10px;color:blue;height:15px;text-align:center}</style></head><body><div id="st"></div><label>Русский текст</label><textarea id="ru" placeholder="Пиши тут..."></textarea><label>Персидский (Farsi)</label><textarea id="fa" style="direction:rtl" placeholder="ترجمه..."></textarea><script>const tg=window.Telegram.WebApp;tg.expand();let t;async function tr(v,sl,tl,tid){if(!v.trim()){document.getElementById(tid).value='';return;}document.getElementById('st').innerText='Перевожу...';try{const r=await fetch(`https://translate.googleapis.com{sl}&tl=${tl}&dt=t&q=${encodeURIComponent(v)}`);const j=await r.json();if(j&&j[0]){let res='';j[0].forEach(s=>{if(s[0])res+=s[0]});document.getElementById(tid).value=res;document.getElementById('st').innerText='Готово';}}catch(e){document.getElementById('st').innerText='Ошибка сети/блокада Google';}}function start(v,s,tl,d){clearTimeout(t);t=setTimeout(()=>tr(v,s,tl,d),1000);}document.getElementById('ru').oninput=function(){start(this.value,'ru','fa','fa')};document.getElementById('fa').oninput=function(){start(this.value,'fa','ru','ru')};</script></body></html>
